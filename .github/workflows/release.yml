name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Нужно для получения истории коммитов и предыдущих тегов

      - name: Generate Release Notes and Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Ищем предыдущий тег
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          echo "## What's Changed" > release_notes.md
          
          if [ -z "$PREV_TAG" ]; then
            git log --pretty=format:"* %s by @%an in %h" ${{ github.ref_name }} >> release_notes.md
          else
            git log --pretty=format:"* %s by @%an in %h" $PREV_TAG..${{ github.ref_name }} >> release_notes.md
            echo "" >> release_notes.md
            echo "## Full Changelog: $PREV_TAG...${{ github.ref_name }}" >> release_notes.md
            echo "https://github.com/${{ github.repository }}/compare/$PREV_TAG...${{ github.ref_name }}" >> release_notes.md
          fi
          
          # Создаем релиз с помощью встроенной утилиты GitHub CLI (gh)
          gh release create ${{ github.ref_name }} --title "Release ${{ github.ref_name }}" --notes-file release_notes.md
